<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Button</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    button {
      padding: 5vw 10vw;
      font-size: clamp(24px, 5vw, 64px);
      border: none;
      border-radius: 2vw;
      cursor: pointer;
      background-color: #2ecc71;
      color: white;
      transition: background-color 0.3s ease;
      width: clamp(280px, 60vw, 800px);
    }
  </style>
</head>
<body>
  <button id="colorBtn" onclick="changeColor()">Click me!</button>

  <script>
    const colors = ['#2ecc71', '#3498db', '#e74c3c', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#e91e63', '#00bcd4', '#8bc34a'];
    let currentIndex = -1;

    function changeColor() {
      currentIndex = (currentIndex + 1) % colors.length;
      document.getElementById('colorBtn').style.backgroundColor = colors[currentIndex];
    }
  </script>
</body>
</html>
